services:
  - type: web
    name: ecommerce-backend
    runtime: node
    plan: free
    rootDir: backend
    env: node
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    startCommand: npx prisma db push && node dist/server.js
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ecommerce-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: CORS_ORIGIN
        value: https://ecommerce-frontend.onrender.com
      - key: SITE_URL
        value: https://ecommerce-frontend.onrender.com
      - key: RAZORPAY_KEY_ID
        value: rzp_test_placeholder
      - key: RAZORPAY_KEY_SECRET
        value: placeholder
      - key: STRIPE_SECRET_KEY
        value: sk_test_placeholder
      - key: STRIPE_WEBHOOK_SECRET
        value: whsec_placeholder
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: placeholder@gmail.com
      - key: SMTP_PASS
        value: placeholder
      - key: EMAIL_FROM
        value: noreply@ecommerce.com
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX
        value: "100"

  - type: web
    name: ecommerce-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://ecommerce-backend.onrender.com/api/v1
      - key: NEXT_PUBLIC_SITE_URL
        value: https://ecommerce-frontend.onrender.com
      - key: NEXT_PUBLIC_RAZORPAY_KEY_ID
        value: rzp_test_placeholder
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        value: pk_test_placeholder

databases:
  - name: ecommerce-db
    plan: free
    databaseName: ecommerce
    ipAllowList: []
